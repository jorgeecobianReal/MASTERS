# PostgreSQL local para desarrollo de MasterMatch AI.
# Levanta la base con:  docker compose up -d
# La URL que produce coincide con DATABASE_URL del .env.example.
services:
  db:
    image: postgres:16-alpine
    container_name: mastermatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mastermatch
      POSTGRES_PASSWORD: mastermatch
      POSTGRES_DB: mastermatch
    ports:
      - "5432:5432"
    volumes:
      - mastermatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastermatch -d mastermatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mastermatch_pgdata:
